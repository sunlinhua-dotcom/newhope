<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新思路集团 × 全域智能化运营提案 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --kraft-bg:#F0E6D2;
  --kraft-paper:#F8F1E0;
  --kraft-card:#FBF6E9;
  --kraft-line:#D8C8A8;
  --kraft-deep:#8B6F47;
  --ink:#1A1A1A;
  --ink-sec:#5C5147;
  --orange:#E25A2C;
  --orange-deep:#B33F18;
  --green:#3F6B3A;
  --shadow:0 8px 24px rgba(74,52,28,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans SC','PingFang SC','Hiragino Sans GB',sans-serif;
  background:var(--kraft-bg);
  color:var(--ink);
  line-height:1.7;
  font-weight:400;
  background-image:
    radial-gradient(circle at 25% 30%,rgba(139,111,71,.06) 0,transparent 50%),
    radial-gradient(circle at 75% 70%,rgba(226,90,44,.04) 0,transparent 50%),
    repeating-linear-gradient(45deg,transparent 0,transparent 2px,rgba(139,111,71,.015) 2px,rgba(139,111,71,.015) 4px);
}
.serif{font-family:'Noto Serif SC',serif}
.mono{font-family:'JetBrains Mono',monospace}
.muted{color:var(--ink-sec)}
.accent{color:var(--orange)}

/* Top nav */
nav.toc{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(240,230,210,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--kraft-line);
  padding:14px 40px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;
}
nav.toc .brand{font-family:'Noto Serif SC',serif;font-weight:900;font-size:16px;letter-spacing:.5px}
nav.toc .brand .accent{color:var(--orange)}
nav.toc ul{display:flex;gap:24px;list-style:none}
nav.toc a{color:var(--ink-sec);text-decoration:none;transition:color .2s}
nav.toc a:hover{color:var(--orange)}

/* Section */
section{
  max-width:1180px;margin:0 auto;padding:120px 60px 80px;
  position:relative;
}
section.cover{padding-top:160px;padding-bottom:140px}

.ch-tag{
  display:inline-block;font-family:'JetBrains Mono',monospace;
  font-size:12px;letter-spacing:2px;color:var(--orange);
  border:1px solid var(--orange);padding:4px 12px;border-radius:2px;
  margin-bottom:24px;
}
h1.title{
  font-family:'Noto Serif SC',serif;font-weight:900;
  font-size:64px;line-height:1.15;letter-spacing:-1px;
  margin-bottom:24px;
}
h2.section-title{
  font-family:'Noto Serif SC',serif;font-weight:900;
  font-size:44px;line-height:1.2;margin-bottom:18px;
}
h3.sub-title{
  font-family:'Noto Serif SC',serif;font-weight:600;
  font-size:24px;margin:48px 0 18px;
  padding-left:14px;border-left:3px solid var(--orange);
}
p.lede{font-size:18px;color:var(--ink-sec);max-width:780px;margin-bottom:40px}
p{margin-bottom:14px;font-size:15px}

/* Cover */
.cover-meta{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:80px;padding-top:32px;border-top:1px solid var(--kraft-line);
  font-size:14px;color:var(--ink-sec);
}
.cover-meta .right{text-align:right}
.cover-stamp{
  position:absolute;top:140px;right:60px;
  width:140px;height:140px;border-radius:50%;
  border:2px solid var(--orange);
  display:flex;align-items:center;justify-content:center;
  color:var(--orange);font-family:'Noto Serif SC',serif;font-weight:900;
  font-size:22px;text-align:center;
  transform:rotate(-8deg);
  background:rgba(255,255,255,.3);
}

/* Cards */
.card{
  background:var(--kraft-card);
  border:1px solid var(--kraft-line);
  border-radius:6px;padding:28px;
  box-shadow:var(--shadow);
  transition:transform .25s,box-shadow .25s;
}
.card:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(74,52,28,.15)}
.grid{display:grid;gap:20px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}

/* Stat */
.stat{padding:24px;background:var(--kraft-card);border:1px solid var(--kraft-line);border-radius:4px}
.stat .label{font-size:12px;color:var(--ink-sec);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.stat .value{font-family:'Noto Serif SC',serif;font-weight:900;font-size:42px;line-height:1;color:var(--ink)}
.stat .value.orange{color:var(--orange)}
.stat .sub{font-size:13px;color:var(--ink-sec);margin-top:8px}

/* Pain box */
.pain{
  padding:22px;background:rgba(226,90,44,.05);
  border-left:4px solid var(--orange);border-radius:0 4px 4px 0;
}
.pain .who{font-size:12px;color:var(--orange);letter-spacing:1px;margin-bottom:6px;font-weight:700}
.pain .quote{font-style:italic;color:var(--ink);line-height:1.6}

/* Table */
table{width:100%;border-collapse:collapse;font-size:14px;background:var(--kraft-card);border:1px solid var(--kraft-line);border-radius:4px;overflow:hidden}
th{background:var(--ink);color:var(--kraft-bg);font-weight:500;padding:14px;text-align:left;font-size:13px;letter-spacing:.5px}
td{padding:13px 14px;border-bottom:1px solid var(--kraft-line)}
td.num,th.num{text-align:right;font-family:'JetBrains Mono',monospace}
tr:last-child td{border-bottom:0}
tr.total td{background:rgba(226,90,44,.08);font-weight:700}

/* Tag */
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;background:var(--kraft-line);color:var(--ink-sec);margin-right:6px;margin-bottom:4px}
.tag.orange{background:var(--orange);color:#fff}
.tag.ink{background:var(--ink);color:var(--kraft-bg)}

/* Chart container */
.chart-box{background:var(--kraft-card);border:1px solid var(--kraft-line);border-radius:4px;padding:24px;height:340px}

/* Divider */
.div{height:1px;background:var(--kraft-line);margin:48px 0}

/* Package card */
.pkg{
  background:var(--kraft-card);border:2px solid var(--kraft-line);
  border-radius:6px;padding:32px;display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
.pkg.featured{border-color:var(--orange);transform:scale(1.02)}
.pkg.featured::before{
  content:'推荐';position:absolute;top:14px;right:-30px;
  background:var(--orange);color:#fff;font-size:11px;letter-spacing:2px;padding:4px 36px;
  transform:rotate(45deg);
}
.pkg .pkg-name{font-family:'Noto Serif SC',serif;font-weight:900;font-size:28px;margin-bottom:6px}
.pkg .pkg-tagline{color:var(--ink-sec);font-size:13px;margin-bottom:20px}
.pkg .pkg-price{font-family:'Noto Serif SC',serif;font-weight:900;font-size:48px;color:var(--orange);line-height:1}
.pkg .pkg-price .unit{font-size:16px;color:var(--ink-sec);margin-left:6px}
.pkg ul{list-style:none;margin-top:24px;flex:1}
.pkg li{padding:8px 0;border-bottom:1px dashed var(--kraft-line);font-size:14px}
.pkg li:last-child{border-bottom:0}
.pkg li::before{content:'▸ ';color:var(--orange);font-weight:700}

/* Timeline */
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:2px;background:var(--kraft-line)}
.tl-item{position:relative;padding-bottom:28px}
.tl-item::before{content:'';position:absolute;left:-32px;top:6px;width:18px;height:18px;border-radius:50%;background:var(--orange);border:3px solid var(--kraft-bg)}
.tl-item .when{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--orange);letter-spacing:1px;margin-bottom:4px}
.tl-item h4{font-family:'Noto Serif SC',serif;font-weight:600;font-size:18px;margin-bottom:6px}

/* Dashboard mock */
.dashboard-mock{
  background:#0F0F0F;border-radius:8px;padding:24px;color:#E8E0CC;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  border:1px solid var(--ink);
}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.dash-cell{background:#1A1A1A;padding:14px;border-radius:4px;border:1px solid #333}
.dash-cell .l{color:#888;font-size:10px;letter-spacing:1px}
.dash-cell .v{font-size:20px;color:var(--orange);font-weight:700;margin-top:4px}
.dash-cell .v.green{color:#7AB87A}
.dash-cell .v.white{color:#E8E0CC}

/* Footer */
footer{
  max-width:1180px;margin:0 auto;padding:60px;border-top:1px solid var(--kraft-line);
  display:flex;justify-content:space-between;align-items:center;color:var(--ink-sec);font-size:13px;
}

/* Decorations */
.deco-quote{
  font-family:'Noto Serif SC',serif;font-size:30px;font-weight:600;
  line-height:1.5;padding:32px 40px;
  border-left:4px solid var(--orange);
  background:rgba(255,255,255,.4);
  margin:40px 0;
}
.deco-quote .src{display:block;font-family:'Noto Sans SC',sans-serif;font-size:14px;color:var(--ink-sec);font-weight:400;margin-top:12px}

/* Pillar card */
.pillar-card{
  background:var(--kraft-card);border:1px solid var(--kraft-line);
  border-radius:4px;padding:22px;height:100%;
}
.pillar-card .num{font-family:'Noto Serif SC',serif;font-weight:900;font-size:48px;color:var(--orange);line-height:1;opacity:.4}
.pillar-card h4{font-family:'Noto Serif SC',serif;font-weight:700;font-size:20px;margin:8px 0 6px}
.pillar-card .meta{font-size:12px;color:var(--ink-sec);margin-bottom:12px;letter-spacing:.5px}
.pillar-card .example{background:#fff;padding:12px;border-radius:3px;font-size:13px;color:var(--ink);font-style:italic;margin-top:auto}

/* Flow */
.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:stretch}
.flow .step{background:var(--kraft-card);border:1px solid var(--kraft-line);padding:16px;text-align:center;font-size:13px;border-radius:4px;position:relative}
.flow .step.active{border-color:var(--orange);background:rgba(226,90,44,.06)}
.flow .step .n{font-family:'Noto Serif SC',serif;font-weight:900;color:var(--orange);font-size:24px;line-height:1}
.flow .step .t{margin-top:8px;font-weight:600}
.flow .step .d{margin-top:4px;font-size:11px;color:var(--ink-sec)}
@media(max-width:900px){.flow{grid-template-columns:1fr 1fr}}

/* AI tool card */
.tool{
  background:var(--kraft-card);border:1px solid var(--kraft-line);
  padding:32px;border-radius:6px;
  display:grid;grid-template-columns:1fr 1.6fr;gap:32px;
  margin-bottom:24px;
}
.tool .left .code{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-sec);
  letter-spacing:2px;margin-bottom:8px;
}
.tool .left h4{font-family:'Noto Serif SC',serif;font-weight:700;font-size:24px;margin-bottom:8px}
.tool .left .who{font-size:13px;color:var(--orange);margin-bottom:16px}
.tool .left .price{font-family:'Noto Serif SC',serif;font-weight:900;font-size:36px;color:var(--ink);margin-top:24px}
.tool .left .price .u{font-size:13px;color:var(--ink-sec);margin-left:6px}
.tool .right{font-size:14px;line-height:1.8}
.tool .right strong{color:var(--orange)}
@media(max-width:900px){.tool{grid-template-columns:1fr}}

/* Matrix */
.matrix{
  background:var(--kraft-card);border:1px solid var(--kraft-line);
  padding:32px;border-radius:6px;
  display:grid;grid-template-columns:200px repeat(4,1fr);gap:1px;
  background:var(--kraft-line);
}
.matrix > div{background:var(--kraft-card);padding:16px;font-size:13px}
.matrix .h{background:var(--ink);color:var(--kraft-bg);font-weight:700;font-size:13px;text-align:center}
.matrix .row-h{font-weight:700;background:var(--kraft-paper);font-size:12px;color:var(--ink-sec);letter-spacing:.5px}

/* hero arrow */
.kpi-row{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;padding:14px;border-bottom:1px solid var(--kraft-line)}
.kpi-row:last-child{border-bottom:0}
.kpi-row .from{color:var(--ink-sec)}
.kpi-row .arrow{color:var(--orange);font-weight:700}
.kpi-row .to{color:var(--orange);font-family:'Noto Serif SC',serif;font-weight:700;font-size:18px}
.kpi-row .label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-sec)}

/* === Figure / 配图样式 === */
figure{margin:0;padding:0}
figcaption{
  font-family:'Noto Sans SC',sans-serif;
  font-size:13px;color:var(--ink-sec);
  line-height:1.55;margin-top:12px;
  text-align:left;letter-spacing:.02em;
}

/* Cover hero image */
.hero-figure{
  margin:40px 0 32px;
  max-width:760px;
  border-radius:4px;overflow:hidden;
  box-shadow:0 16px 48px rgba(74,52,28,.18);
}
.hero-figure img{
  width:100%;height:auto;display:block;
  border-radius:4px;
}
.hero-figure figcaption{
  font-family:'Noto Serif SC',serif;font-style:italic;
  font-size:14px;color:var(--ink-sec);
  text-align:center;margin-top:14px;
}

/* 4 brand grid */
.brand-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:18px;margin:32px 0 48px;
}
.brand-grid figure{
  background:var(--kraft-card);
  border:1px solid var(--kraft-line);
  border-radius:6px;overflow:hidden;
  transition:transform .25s,box-shadow .25s;
}
.brand-grid figure:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.brand-grid img{width:100%;height:240px;object-fit:cover;display:block}
.brand-grid figcaption{
  padding:14px 18px 16px;margin:0;
  border-top:1px solid var(--kraft-line);
}
.brand-grid figcaption strong{
  display:block;font-family:'Noto Serif SC',serif;
  font-weight:700;font-size:16px;color:var(--ink);
  margin-bottom:4px;
}
.brand-grid figcaption span{
  display:block;font-size:12px;color:var(--ink-sec);
  letter-spacing:.5px;
}
@media(max-width:720px){
  .brand-grid{grid-template-columns:1fr}
  .brand-grid img{height:200px}
}

/* Full-width inline figure */
.full-figure{
  margin:36px 0 40px;
  border-radius:6px;overflow:hidden;
  border:1px solid var(--kraft-line);
}
.full-figure img{width:100%;height:auto;display:block}
.full-figure figcaption{
  padding:12px 18px;background:var(--kraft-card);
  border-top:1px solid var(--kraft-line);margin:0;
  font-size:12.5px;color:var(--ink-sec);
}
.full-figure.dark{border-color:#222}
.full-figure.dark figcaption{background:#1a1a1a;color:#c8c0b0;border-top-color:#333}

/* Side figure (with surrounding text) */
.side-figure{
  float:right;margin:0 0 24px 32px;
  max-width:380px;
  border-radius:4px;overflow:hidden;
  border:1px solid var(--kraft-line);
}
.side-figure img{width:100%;height:auto;display:block}
.side-figure figcaption{
  padding:10px 14px;background:var(--kraft-card);
  font-size:12px;color:var(--ink-sec);margin:0;
}
@media(max-width:720px){
  .side-figure{float:none;margin:24px 0;max-width:100%}
}

/* === djhh · CJK Typography Defaults === */
html{hanging-punctuation:allow-end;}
body{font-feature-settings:"tnum","palt";text-spacing-trim:trim-start;}
h1,h2,h3,h4,h5,h6,
p,li,td,th,blockquote,cite,
.lede,.section-title,.sub-title,.title,
.cover-stamp,.ch-tag,.muted,.stat .label,.stat .sub,
.quote,.who,.tag,.cell-title,.from,.to{
  word-break:keep-all;
  overflow-wrap:break-word;
  text-wrap:balance;
}
.lede{max-width:46ch;line-height:1.6;}
.muted,.stat .sub{max-width:46ch;}
.stat .value,.num,.dash-cell .v,.price,.from,.to,
.cover-meta .mono,
td.num,table .num{
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}
h1.title{line-height:1.05;}
h2.section-title{line-height:1.15;}
h3.sub-title{line-height:1.25;}
p,li,td,th{line-height:1.7;}

/* === Print / PDF rules === */
@page{ size:A4; margin:14mm 12mm; }
@media print{
  html,body{background:var(--kraft-bg);-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  nav.toc{display:none !important;}
  section{padding:30mm 0 25mm;page-break-after:always;break-after:page;}
  section:last-of-type{page-break-after:auto;break-after:auto;}
  .section-title{font-size:30pt !important;}
  .lede{font-size:11.5pt !important;max-width:54ch;}
  h3.sub-title{font-size:16pt !important;}
  p,li,td,th{font-size:10.5pt !important;line-height:1.55 !important;}
  canvas{max-width:100% !important;height:auto !important;}
  .grid,.stat,table,.cover-meta{page-break-inside:avoid;break-inside:avoid;}
  a{color:var(--ink) !important;text-decoration:none !important;}
}
</style>




<style>
#gate{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--kraft-bg,#F0E6D2);z-index:9999;
  background-image:
    radial-gradient(circle at 25% 30%,rgba(139,111,71,.10) 0,transparent 50%),
    radial-gradient(circle at 75% 70%,rgba(226,90,44,.06) 0,transparent 50%);
}
#gate .card{
  background:#FBF6E9;border:1px solid #D8C8A8;
  padding:48px 56px;max-width:440px;width:90%;
  box-shadow:0 16px 48px rgba(74,52,28,.18);border-radius:6px;text-align:center;
}
#gate .stamp{
  width:88px;height:88px;border-radius:50%;
  border:2px solid #E25A2C;color:#E25A2C;
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Serif SC',serif;font-weight:900;
  font-size:14px;margin:0 auto 24px;transform:rotate(-6deg);
  background:rgba(255,255,255,.4);
}
#gate h1{font-family:'Noto Serif SC',serif;font-weight:900;font-size:24px;margin-bottom:8px;color:#1A1A1A;line-height:1.4}
#gate p{color:#5C5147;font-size:14px;margin-bottom:24px}
#gate input{
  width:100%;padding:14px 16px;font-size:18px;
  border:1px solid #D8C8A8;border-radius:4px;
  background:#fff;text-align:center;letter-spacing:8px;
  font-family:'JetBrains Mono',monospace;
}
#gate input:focus{outline:none;border-color:#E25A2C;box-shadow:0 0 0 3px rgba(226,90,44,.15)}
#gate button{
  width:100%;padding:14px;margin-top:14px;font-size:15px;
  background:#1A1A1A;color:#F0E6D2;border:0;border-radius:4px;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;letter-spacing:2px;
  transition:background .2s;
}
#gate button:hover{background:#E25A2C}
#gate .err{color:#B33F18;font-size:13px;margin-top:14px;min-height:18px;letter-spacing:0}
#gate .foot{margin-top:32px;font-size:11px;color:#8B6F47;letter-spacing:1px}
.hidden{display:none !important}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div class="stamp">CONFIDENTIAL<br>2026</div>
    <h1>新思路 × 2026<br>全域智能化运营提案</h1>
    <p>本文档包含商业敏感信息<br>请输入访问密码</p>
    <form id="gateForm">
      <input id="pwd" type="password" maxlength="24" autocomplete="off" inputmode="numeric" placeholder="• • • • • •">
      <button type="submit">解 锁 文 档</button>
    </form>
    <div class="err" id="err"></div>
    <div class="foot">PROTECTED BY AES-256-GCM · NOINDEX</div>
  </div>
</div>

const ITER     = 250000;

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}

async function unlock(pwd){
  const enc = new TextEncoder();
  const pwKey = await crypto.subtle.importKey(
    "raw", enc.encode(pwd), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(SALT_B64), iterations:ITER, hash:"SHA-256"},
    pwKey,
    {name:"AES-GCM", length:256},
    false, ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv:b64(IV_B64)}, key, b64(CT_B64)
  );
  return new TextDecoder().decode(plain);
}

function injectAndExecute(html){
  const content = document.getElementById('content');
  content.innerHTML = html;
  content.classList.remove('hidden');
  document.getElementById('gate').style.display = 'none';
  // 重新执行注入内容里的所有 <script>
  content.querySelectorAll('script').forEach(old=>{
    const s = document.createElement('script');
    if(old.src) s.src = old.src;
    else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

document.getElementById('gateForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pwd = document.getElementById('pwd').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if(!pwd){err.textContent='请输入密码';return}
  try{
    const html = await unlock(pwd);
    // 缓存到 sessionStorage,免去刷新重输
    try{sessionStorage.setItem('np_pwd', pwd)}catch(e){}
    injectAndExecute(html);
  }catch(ex){
    err.textContent = '密码错误,请重试';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});

// 页面加载时若 sessionStorage 有缓存密码,自动解锁
(async ()=>{
  try{
    const cached = sessionStorage.getItem('np_pwd');
    if(cached){
      const html = await unlock(cached);
      injectAndExecute(html);
    }else{
      document.getElementById('pwd').focus();
    }
  }catch(e){document.getElementById('pwd').focus()}
})();
</script>
