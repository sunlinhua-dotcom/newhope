<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>新思路集团 × 全域智能化运营提案 2026 · 受保护</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>新思路集团 × 全域智能化运营提案 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --kraft:#c8a876;
    --kraft-dark:#9c7e4f;
    --kraft-light:#e8d7b3;
    --cream:#f5efe4;
    --cream-deep:#ebe2cf;
    --ink:#1a1612;
    --ink-soft:#3a342c;
    --paper:#fbf7ee;
    --orange:#ff6b35;
    --orange-deep:#e54a18;
    --green:#3a6b3a;
    --green-deep:#1f4520;
    --red:#b8392a;
    --gray:#8a8275;
    --line:#d9cfb8;
    --line-soft:#ebe4d2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;hanging-punctuation:allow-end;}
  body{
    font-family:'Inter','PingFang SC','Hiragino Sans GB','Helvetica Neue',sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    font-feature-settings:"tnum","palt";
    text-spacing-trim:trim-start;
  }

  /* ========= djhh · CJK Typography Defaults ========= */
  /* 所有标题 / 段落 / 卡片 / 单元格:中文不在词内断,多行长度均衡 */
  h1,h2,h3,h4,h5,h6,
  p,li,td,th,blockquote,cite,
  .lead,.chapter,.cell-title,.cell-desc,
  .toc-title,.toc-desc,.brand-name,.card h4,.card p,
  .stat-card .lbl,.tool-card h3,.price-col h3,.price-sub,
  .road-step h4,.road-step li,
  .dash-title,.dash-panel h5,
  .quote-section blockquote,.quote-section cite,
  .cover-title,.cover-sub,.section-eyebrow{
    word-break:keep-all;
    overflow-wrap:break-word;
    text-wrap:balance;
  }
  /* 段落 max-width 让自然换行,避免每行 60+ 字 */
  .lead{max-width:46ch;line-height:1.55;}
  .cover-sub{max-width:42ch;}
  .card p,.stat-card p,.tool-card p,.brand-row p,
  .road-step p,.price-col p,.dash-panel p,
  blockquote{max-width:46ch;}
  /* 数字 / 货币 / 百分比 / 倍数:绝不断行 */
  .num,.num-cell,.big,.val,.price-num,.cover-num,
  .pos,.neg,.delta,
  td.num-cell{
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
    font-feature-settings:"tnum";
  }
  /* 行高 */
  h1,.cover-title{line-height:1.05;}
  h2,.chapter{line-height:1.12;}
  h3,h4,h5{line-height:1.2;}
  p,li,td,th{line-height:1.7;}
  /* ========= /djhh ========= */

  /* ========= Print / PDF rules ========= */
  @page{ size: A4; margin: 14mm 12mm; }
  @media print{
    html,body{ background:var(--paper); -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    nav.top{ display:none !important; }
    section{ padding:36mm 0 28mm; page-break-after:always; break-after:page; }
    section:last-of-type{ page-break-after:auto; break-after:auto; }
    .chapter{ font-size:34pt !important; }
    .lead{ font-size:12pt !important; max-width:54ch; }
    h3{ font-size:18pt !important; }
    h4{ font-size:13pt !important; }
    p,li,td,th{ font-size:10.5pt !important; line-height:1.55 !important; }
    .container{ padding:0 16mm; }
    .toc-list,.three-col,.two-col,.four-col,
    .road-grid,.pricing-grid,
    .brand-row,.dash-charts{ page-break-inside:avoid; break-inside:avoid; }
    canvas{ max-width:100% !important; height:auto !important; }
    .cover{ min-height:230mm; }
    a{ color:var(--ink) !important; text-decoration:none !important; }
  }
  /* ========= /print ========= */
  /* Texture overlay - paper feel */
  body::before{
    content:'';
    position:fixed;inset:0;
    pointer-events:none;
    z-index:1;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(156,126,79,0.04) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(156,126,79,0.03) 0, transparent 40%);
    mix-blend-mode:multiply;
  }
  .serif{font-family:'Noto Serif SC',serif;letter-spacing:.02em}
  .mono{font-family:'JetBrains Mono',monospace}

  /* Top Navigation */
  nav.top{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(251,247,238,.92);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);
    padding:14px 40px;
    display:flex;align-items:center;justify-content:space-between;
  }
  nav.top .brand{
    font-family:'Noto Serif SC',serif;
    font-weight:700;font-size:15px;
    display:flex;align-items:center;gap:10px;
  }
  nav.top .brand .dot{
    width:8px;height:8px;background:var(--orange);
    border-radius:50%;display:inline-block;
  }
  nav.top ul{
    display:flex;gap:28px;list-style:none;
    font-size:13px;font-weight:500;
  }
  nav.top a{color:var(--ink-soft);text-decoration:none;transition:color .2s}
  nav.top a:hover{color:var(--orange)}
  nav.top .meta{font-size:12px;color:var(--gray);font-family:'JetBrains Mono',monospace}

  section{
    min-height:100vh;
    padding:120px 80px 80px;
    position:relative;
    z-index:2;
  }
  section.compact{min-height:auto;padding:80px 80px}
  .container{max-width:1280px;margin:0 auto}

  /* Chapter marker */
  .chapter-mark{
    display:flex;align-items:center;gap:16px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--kraft-dark);
    margin-bottom:24px;
  }
  .chapter-mark .num{
    background:var(--ink);color:var(--paper);
    padding:4px 10px;font-weight:700;
  }
  .chapter-mark .line{flex:1;height:1px;background:var(--line);max-width:120px}

  h1.cover{
    font-family:'Noto Serif SC',serif;
    font-weight:900;font-size:clamp(48px,7vw,108px);
    line-height:1.02;letter-spacing:-.01em;
    color:var(--ink);
  }
  h1.cover .accent{color:var(--orange);font-style:italic}
  h2.chapter{
    font-family:'Noto Serif SC',serif;
    font-weight:700;font-size:clamp(36px,5vw,64px);
    line-height:1.1;color:var(--ink);
    margin-bottom:24px;
  }
  h2.chapter .em{color:var(--orange)}
  h3{
    font-family:'Noto Serif SC',serif;
    font-weight:600;font-size:24px;
    margin-bottom:14px;color:var(--ink);
  }
  h4{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;color:var(--kraft-dark)}
  p.lead{font-size:19px;line-height:1.75;color:var(--ink-soft);max-width:780px;margin-bottom:28px}
  p{color:var(--ink-soft);font-size:15px;line-height:1.75}

  /* ========= COVER ========= */
  .cover-section{
    background:
      linear-gradient(135deg, var(--cream) 0%, var(--cream-deep) 100%);
    overflow:hidden;
  }
  .cover-section::after{
    content:'';position:absolute;inset:0;
    background-image:
      repeating-linear-gradient(45deg, transparent 0 24px, rgba(156,126,79,.04) 24px 25px);
    pointer-events:none;
  }
  .cover-grid{display:grid;grid-template-columns:1fr 360px;gap:80px;align-items:end;min-height:75vh}
  .cover-meta{
    border-left:2px solid var(--ink);
    padding-left:24px;
    font-size:12px;font-family:'JetBrains Mono',monospace;
    color:var(--ink-soft);line-height:2;
    text-transform:uppercase;letter-spacing:.15em;
  }
  .cover-meta strong{color:var(--orange)}
  .cover-tagline{
    margin-top:32px;
    display:flex;gap:24px;flex-wrap:wrap;
    font-size:13px;font-weight:600;color:var(--ink-soft);
  }
  .cover-tagline span{
    padding:8px 16px;background:rgba(26,22,18,.06);
    border:1px solid var(--line);
  }
  .stamp{
    position:absolute;top:140px;right:80px;
    border:3px solid var(--orange);
    color:var(--orange);
    padding:14px 22px;
    font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:13px;letter-spacing:.2em;
    transform:rotate(-8deg);
    background:rgba(255,107,53,.05);
  }
  .cover-bar{
    margin-top:80px;
    display:grid;grid-template-columns:repeat(4,1fr);
    border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);
    background:var(--paper);
  }
  .cover-bar > div{padding:24px;border-right:1px solid var(--line);text-align:left}
  .cover-bar > div:last-child{border-right:none}
  .cover-bar .num{
    font-family:'Noto Serif SC',serif;font-weight:700;
    font-size:42px;line-height:1;color:var(--ink);
  }
  .cover-bar .num .unit{font-size:14px;color:var(--gray);margin-left:4px}
  .cover-bar .label{font-size:11px;letter-spacing:.15em;color:var(--gray);margin-top:8px;text-transform:uppercase}

  /* ========= TOC ========= */
  .toc-section{background:var(--ink);color:var(--cream)}
  .toc-section h2.chapter,
  .toc-section .chapter-mark{color:var(--kraft-light)}
  .toc-section .chapter-mark .num{background:var(--orange);color:var(--ink)}
  .toc-section .chapter-mark .line{background:#3a342c}
  .toc-grid{
    display:grid;grid-template-columns:repeat(2,1fr);
    gap:0;
    border-top:1px solid #3a342c;
    margin-top:40px;
  }
  .toc-item{
    display:flex;gap:24px;padding:28px 0;
    border-bottom:1px solid #3a342c;
    padding-right:32px;
    transition:padding-left .3s;
    cursor:pointer;
  }
  .toc-item:nth-child(odd){border-right:1px solid #3a342c;padding-right:32px}
  .toc-item:nth-child(even){padding-left:32px}
  .toc-item:hover{background:rgba(255,107,53,.06)}
  .toc-num{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;color:var(--orange);font-weight:700;
    min-width:32px;
  }
  .toc-title{
    font-family:'Noto Serif SC',serif;font-weight:600;
    font-size:22px;color:var(--cream);
    margin-bottom:6px;
  }
  .toc-desc{font-size:13px;color:#a8a094;line-height:1.6}
  .toc-item a{color:inherit;text-decoration:none;display:block;flex:1}

  /* ========= GENERIC GRID ========= */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:48px}
  .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:48px}
  .four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:40px}

  /* ========= CARDS ========= */
  .card{
    background:var(--paper);
    border:1px solid var(--line);
    padding:32px;
    position:relative;
  }
  .card.kraft{background:var(--kraft);color:var(--ink);border:none}
  .card.ink{background:var(--ink);color:var(--cream);border:none}
  .card.ink h3,.card.ink h4{color:var(--cream)}
  .card.ink p{color:#b8b1a2}
  .card.outlined{background:transparent;border:1.5px solid var(--ink)}
  .card .num-tag{
    position:absolute;top:-12px;left:24px;
    background:var(--orange);color:var(--paper);
    padding:4px 12px;font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:700;letter-spacing:.15em;
  }
  .stat-card{
    padding:28px;background:var(--paper);border:1px solid var(--line);
    position:relative;
  }
  .stat-card .big{
    font-family:'Noto Serif SC',serif;font-weight:700;
    font-size:48px;line-height:1;color:var(--ink);
    margin-bottom:8px;
  }
  .stat-card .big .unit{font-size:14px;color:var(--gray);margin-left:4px;font-weight:400}
  .stat-card .big.orange{color:var(--orange)}
  .stat-card .big.green{color:var(--green-deep)}
  .stat-card .big.red{color:var(--red)}
  .stat-card .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:8px}
  .stat-card .delta{font-size:12px;font-weight:600;margin-top:8px;font-family:'JetBrains Mono',monospace}
  .stat-card .delta.up{color:var(--green-deep)}
  .stat-card .delta.down{color:var(--red)}

  /* ========= TABLES ========= */
  table.data{
    width:100%;border-collapse:collapse;
    background:var(--paper);
    font-size:14px;
    margin-top:24px;
    border:1px solid var(--ink);
  }
  table.data thead{background:var(--ink);color:var(--cream)}
  table.data th{
    text-align:left;padding:14px 16px;
    font-size:11px;letter-spacing:.15em;text-transform:uppercase;
    font-weight:600;
  }
  table.data td{
    padding:14px 16px;border-top:1px solid var(--line-soft);
    color:var(--ink-soft);
  }
  table.data tr:nth-child(even) td{background:rgba(156,126,79,.04)}
  table.data .num-cell{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--ink)}
  table.data .pos{color:var(--green-deep);font-weight:700}
  table.data .neg{color:var(--red);font-weight:700}

  /* ========= CHARTS ========= */
  .chart-wrap{
    background:var(--paper);
    border:1px solid var(--line);
    padding:32px;
    position:relative;
  }
  .chart-wrap .chart-title{
    font-family:'Noto Serif SC',serif;font-weight:600;
    font-size:18px;margin-bottom:4px;
  }
  .chart-wrap .chart-sub{font-size:12px;color:var(--gray);margin-bottom:24px}
  .chart-box{position:relative;height:280px}
  .chart-box.tall{height:380px}

  /* ========= PAIN POINTS GRID ========= */
  .pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:40px;border:1px solid var(--ink)}
  .pain-cell{
    padding:28px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    background:var(--paper);position:relative;min-height:200px;
  }
  .pain-cell:nth-child(3n){border-right:none}
  .pain-cell:nth-last-child(-n+3){border-bottom:none}
  .pain-cell .pain-num{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--red);font-weight:700;
    margin-bottom:12px;letter-spacing:.15em;
  }
  .pain-cell .pain-title{
    font-family:'Noto Serif SC',serif;font-weight:600;
    font-size:18px;margin-bottom:10px;color:var(--ink);
  }
  .pain-cell .pain-fix{
    margin-top:16px;padding-top:16px;border-top:1px dashed var(--line);
    font-size:12px;color:var(--green-deep);
  }
  .pain-cell .pain-fix strong{color:var(--green-deep);font-family:'JetBrains Mono',monospace}

  /* ========= BRAND MATRIX ========= */
  .brand-row{
    display:grid;grid-template-columns:200px 1fr 1fr 1fr 1fr;
    align-items:stretch;
    border-bottom:1px solid var(--line);
  }
  .brand-row.header{
    background:var(--ink);color:var(--cream);
    border-bottom:none;
  }
  .brand-row.header > div{
    padding:14px 18px;font-size:11px;letter-spacing:.15em;
    text-transform:uppercase;font-weight:600;
  }
  .brand-row > div{padding:24px 18px;border-right:1px solid var(--line)}
  .brand-row > div:last-child{border-right:none}
  .brand-row .brand-name{
    font-family:'Noto Serif SC',serif;font-weight:700;
    font-size:18px;background:var(--cream);
  }
  .brand-row .brand-name .tag{
    display:block;font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--gray);font-weight:400;
    margin-top:6px;letter-spacing:.05em;
  }
  .brand-row .cell-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .brand-row .cell-desc{font-size:12px;color:var(--ink-soft);line-height:1.6}

  /* ========= AI TOOL CARDS ========= */
  .tool-card{
    background:var(--paper);border:1px solid var(--line);
    padding:36px;position:relative;
    transition:transform .3s,box-shadow .3s;
  }
  .tool-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(26,22,18,.08)}
  .tool-card .tool-icon{
    width:56px;height:56px;
    background:var(--ink);color:var(--orange);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;
    margin-bottom:20px;
  }
  .tool-card h3{font-size:22px;margin-bottom:8px}
  .tool-card .tool-tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;
    color:var(--orange);letter-spacing:.15em;margin-bottom:16px;
    text-transform:uppercase;font-weight:700;
  }
  .tool-card ul{list-style:none;margin-top:18px}
  .tool-card ul li{
    font-size:13px;color:var(--ink-soft);
    padding:6px 0;padding-left:20px;position:relative;
  }
  .tool-card ul li::before{
    content:'→';position:absolute;left:0;color:var(--orange);font-weight:700;
  }

  /* ========= DASHBOARD MOCKUP ========= */
  .dashboard{
    background:var(--ink);color:var(--cream);
    border-radius:8px;padding:32px;margin-top:40px;
    overflow:hidden;
  }
  .dashboard .dash-header{
    display:flex;justify-content:space-between;align-items:center;
    padding-bottom:20px;border-bottom:1px solid #3a342c;margin-bottom:24px;
  }
  .dashboard .dash-title{font-family:'Noto Serif SC',serif;font-weight:600;font-size:20px}
  .dashboard .dash-meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--kraft);letter-spacing:.1em}
  .dash-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#3a342c;margin-bottom:24px}
  .dash-kpi > div{background:var(--ink);padding:20px}
  .dash-kpi .lbl{font-size:11px;color:#8a8275;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .dash-kpi .val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:var(--cream)}
  .dash-kpi .delta{font-size:11px;color:var(--orange);margin-top:4px}
  .dash-charts{display:grid;grid-template-columns:2fr 1fr;gap:24px}
  .dash-panel{background:#0f0d0a;border:1px solid #3a342c;padding:20px}
  .dash-panel h5{font-size:12px;color:var(--kraft-light);text-transform:uppercase;letter-spacing:.15em;margin-bottom:16px}

  /* ========= ROADMAP ========= */
  .roadmap{margin-top:60px;position:relative}
  .roadmap::before{
    content:'';position:absolute;top:30px;left:0;right:0;height:2px;
    background:var(--ink);
  }
  .road-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;
  }
  .road-step{padding:0 20px;position:relative}
  .road-dot{
    width:60px;height:60px;border-radius:50%;
    background:var(--paper);border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;
    margin:0 auto 24px;position:relative;z-index:2;
    color:var(--ink);
  }
  .road-step.active .road-dot{background:var(--orange);border-color:var(--orange);color:var(--paper)}
  .road-step h4{text-align:center;color:var(--ink);font-size:13px;letter-spacing:.1em;margin-bottom:8px}
  .road-step .road-period{
    text-align:center;font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--orange);font-weight:600;
    margin-bottom:12px;letter-spacing:.1em;
  }
  .road-step ul{list-style:none;font-size:13px;color:var(--ink-soft)}
  .road-step ul li{padding:4px 0;padding-left:14px;position:relative;line-height:1.5}
  .road-step ul li::before{content:'·';position:absolute;left:0;color:var(--orange);font-weight:700}

  /* ========= PRICING ========= */
  .pricing-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:60px;
    border:2px solid var(--ink);
  }
  .price-col{
    padding:40px 32px;border-right:1px solid var(--line);
    background:var(--paper);position:relative;
  }
  .price-col:last-child{border-right:none}
  .price-col.featured{background:var(--ink);color:var(--cream)}
  .price-col.featured h3{color:var(--cream)}
  .price-col.featured .price-num{color:var(--orange)}
  .price-col.featured .price-list li{color:#c8c0b0;border-color:#3a342c}
  .price-col .price-badge{
    position:absolute;top:0;left:32px;
    background:var(--orange);color:var(--paper);
    padding:4px 12px;font-size:10px;font-weight:700;
    letter-spacing:.15em;font-family:'JetBrains Mono',monospace;
    transform:translateY(-50%);
  }
  .price-col h3{font-family:'Noto Serif SC',serif;font-size:24px;margin-bottom:6px}
  .price-col .price-sub{font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:.1em;margin-bottom:24px}
  .price-col .price-num{
    font-family:'Noto Serif SC',serif;font-weight:700;font-size:56px;
    line-height:1;color:var(--ink);
  }
  .price-col .price-num .currency{font-size:20px;font-weight:400;margin-right:4px;color:var(--gray)}
  .price-col .price-num .period{font-size:14px;color:var(--gray);font-weight:400;margin-left:6px}
  .price-col .price-list{list-style:none;margin-top:28px}
  .price-col .price-list li{
    font-size:13px;padding:12px 0;border-bottom:1px dashed var(--line);
    color:var(--ink-soft);line-height:1.5;
  }
  .price-col .price-list li::before{
    content:'✓';color:var(--orange);font-weight:700;margin-right:10px;
  }
  .price-col .price-cta{
    margin-top:28px;padding:14px 24px;
    background:var(--orange);color:var(--paper);
    text-align:center;font-weight:700;font-size:13px;
    letter-spacing:.1em;text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;cursor:pointer;
  }
  .price-col.featured .price-cta{background:var(--orange)}

  .price-detail-table{margin-top:60px}

  /* ========= APPENDIX ========= */
  .quote-section{
    background:var(--kraft);padding:80px;margin-top:80px;
    border:none;color:var(--ink);position:relative;
  }
  .quote-section::before{
    content:'"';font-family:'Noto Serif SC',serif;
    position:absolute;top:20px;left:40px;
    font-size:160px;line-height:1;color:var(--ink);opacity:.15;font-weight:900;
  }
  .quote-section blockquote{
    font-family:'Noto Serif SC',serif;font-size:32px;
    font-weight:500;line-height:1.5;
    max-width:900px;position:relative;z-index:1;
  }
  .quote-section cite{
    display:block;margin-top:24px;font-style:normal;
    font-size:14px;font-family:'JetBrains Mono',monospace;
    color:var(--ink-soft);letter-spacing:.1em;
  }

  /* Footer */
  footer{
    background:var(--ink);color:var(--cream);
    padding:60px 80px 40px;text-align:center;
  }
  footer .footer-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:40px;
    text-align:left;max-width:1280px;margin:0 auto 48px;
  }
  footer h5{
    font-size:11px;color:var(--orange);text-transform:uppercase;
    letter-spacing:.2em;margin-bottom:16px;font-weight:700;
  }
  footer p{color:#a8a094;font-size:14px;line-height:1.8}
  footer .copyright{
    border-top:1px solid #3a342c;padding-top:24px;
    font-size:12px;color:#5a5448;
    font-family:'JetBrains Mono',monospace;letter-spacing:.1em;
  }

  /* Decorative bits */
  .corner-mark{
    position:absolute;font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--kraft-dark);letter-spacing:.2em;
    text-transform:uppercase;
  }
  .corner-mark.tl{top:120px;left:80px}
  .corner-mark.tr{top:120px;right:80px}

  /* Print */
  @media print {
    nav.top{display:none}
    section{page-break-after:always;min-height:auto;padding:40px}
  }

  /* Responsive */
  @media (max-width:1024px){
    section{padding:100px 32px 60px}
    .cover-grid{grid-template-columns:1fr}
    .two-col,.three-col,.four-col{grid-template-columns:1fr;gap:24px}
    .cover-bar{grid-template-columns:repeat(2,1fr)}
    .pain-grid,.dash-kpi,.pricing-grid{grid-template-columns:1fr}
    .pain-cell{border-right:none!important}
    .dash-charts{grid-template-columns:1fr}
    .brand-row{grid-template-columns:1fr}
    .road-grid{grid-template-columns:1fr;gap:32px}
    .roadmap::before{display:none}
    nav.top ul{display:none}
    h1.cover{font-size:48px}
  }

  /* Reveal animation */
  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:translateY(0)}
</style>

const ITER     = 250000;

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}

async function unlock(pwd){
  const enc = new TextEncoder();
  const pwKey = await crypto.subtle.importKey(
    "raw", enc.encode(pwd), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(SALT_B64), iterations:ITER, hash:"SHA-256"},
    pwKey,
    {name:"AES-GCM", length:256},
    false, ["decrypt"]
  );
  const plain = await crypto.subtle.decrypt(
    {name:"AES-GCM", iv:b64(IV_B64)}, key, b64(CT_B64)
  );
  return new TextDecoder().decode(plain);
}

function injectAndExecute(html){
  const content = document.getElementById('content');
  content.innerHTML = html;
  content.classList.remove('hidden');
  document.getElementById('gate').style.display = 'none';
  // 重新执行注入内容里的所有 <script>
  content.querySelectorAll('script').forEach(old=>{
    const s = document.createElement('script');
    if(old.src) s.src = old.src;
    else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

document.getElementById('gateForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pwd = document.getElementById('pwd').value.trim();
  const err = document.getElementById('err');
  err.textContent = '';
  if(!pwd){err.textContent='请输入密码';return}
  try{
    const html = await unlock(pwd);
    // 缓存到 sessionStorage,免去刷新重输
    try{sessionStorage.setItem('np_pwd', pwd)}catch(e){}
    injectAndExecute(html);
  }catch(ex){
    err.textContent = '密码错误,请重试';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});

// 页面加载时若 sessionStorage 有缓存密码,自动解锁
(async ()=>{
  try{
    const cached = sessionStorage.getItem('np_pwd');
    if(cached){
      const html = await unlock(cached);
      injectAndExecute(html);
    }else{
      document.getElementById('pwd').focus();
    }
  }catch(e){document.getElementById('pwd').focus()}
})();
</script>
